<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laravel API Toolkit - Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="The Laravel API Toolkit is a comprehensive suite of tools designed to help you create robust, high-performance APIs using Laravel's industry-leading best practices.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="keywords" content="Laravel, API, Toolkit, Documentation, PHP, API Development">
    <meta name="author" content="Laravel API Toolkit">
    <meta name="theme-color" content="#3f51b5">
    <link rel="canonical" href="https://laravelapitoolkit.com">
    <link rel="alternate" hreflang="en" href="https://laravelapitoolkit.com">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://laravelapitoolkit.com">
    <meta property="og:title" content="Laravel API Toolkit - Documentation">
    <meta property="og:description" content="The Laravel API Toolkit is a comprehensive suite of tools designed to help you create robust, high-performance APIs using Laravel.">
    <meta property="og:image" content="https://raw.githubusercontent.com/ahmedesa/laravel-api-tool-kit/master/laravel-api-tool-kit.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://laravelapitoolkit.com">
    <meta property="twitter:title" content="Laravel API Toolkit - Documentation">
    <meta property="twitter:description" content="Build robust APIs with Laravel using our comprehensive toolkit.">

    <!-- Robots -->
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">

    <!-- Docsify Default Theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">

    <!-- Minimal style adjustments -->
    <style>
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700 !important;
        }

        .sidebar-nav > ul > li > a {
            padding-left: 20px !important;
        }

        .sidebar-nav > ul > li > ul > li > a {
            padding-left: 40px !important;
        }
    </style>
</head>
<body>
    <div id="app">Loading...</div>

    <script>
        window.$docsify = {
            name: 'Laravel API Toolkit',
            repo: 'https://github.com/ahmedesa/laravel-api-tool-kit',
            homepage: 'README.md',
            loadSidebar: true,
            loadNavbar: true,
            subMaxLevel: 2,
            maxLevel: 3,
            auto2top: true,
            mergeNavbar: true,
            formatUpdated: '{MM}/{DD}/{YYYY} {HH}:{mm}',
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: 'Search documentation...',
                noData: 'No results found',
                depth: 2,
            },
            plugins: [
                function(hook, vm) {
                    hook.beforeEach(function(html) {
                        // Add edit link for v2 and v3 docs
                        const pathMatch = window.location.pathname.match(/(v\d+)\//);
                        if (pathMatch) {
                            const version = pathMatch[1];
                            const docPath = vm.route.file;
                            if (docPath) {
                                const editUrl = `https://github.com/ahmedesa/laravel-api-tool-kit-docs/edit/main/${version}/${docPath.replace('.md', '.md')}`;
                                html += `\n\n---\n\n[✏️ Edit this page on GitHub](${editUrl})`;
                            }
                        }
                        return html;
                    });

                    // Handle version switching - stay on same page
                    hook.doneEach(function() {
                        const navVersionLinks = document.querySelectorAll('nav.app-nav ul li ul li a');
                        navVersionLinks.forEach(link => {
                            const href = link.getAttribute('href');
                            if (href === '/v2/' || href === '/v3/') {
                                link.onclick = function(e) {
                                    e.preventDefault();

                                    const currentHash = window.location.hash;
                                    const newVersion = href === '/v2/' ? 'v2' : 'v3';

                                    // Try to extract current page
                                    const pageMatch = currentHash.match(/#\/v\d+\/([^?]+)/);

                                    if (pageMatch && pageMatch[1] && pageMatch[1] !== '') {
                                        // Navigate to same page in different version
                                        const page = pageMatch[1];
                                        window.location.hash = `#/${newVersion}/${page}`;
                                    } else {
                                        // If home or no specific page, go to version home
                                        window.location.hash = `#/${newVersion}/`;
                                    }

                                    return false;
                                };
                            }
                        });
                    });
                }
            ]
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
</body>
</html>
